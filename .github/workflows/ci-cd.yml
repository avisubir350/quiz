name: QuizApp CI/CD Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:

  # ── Job 1: Lint, Test & OWASP ─────────────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Lint backend
        run: npx eslint . --ext .js || true
        working-directory: backend

      - name: Lint frontend
        run: npx eslint src/ --ext .js,.jsx || true
        working-directory: frontend

      - name: Frontend build test
        run: npm run build
        working-directory: frontend
        env:
          CI: false

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "quizapp"
          path: "./"
          format: "ALL"
          output: "dependency-check-report"

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: dependency-check-report/

  # ── Job 2: Build & Push Docker Images ─────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=v1.0" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/quizapp-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/quizapp-backend:${{ steps.vars.outputs.tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/quizapp-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/quizapp-frontend:${{ steps.vars.outputs.tag }}

  # ── Job 3: GitOps — Update config repo ────────────────────────────────────
  gitops-update:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: 'avisubir350/quizapp-config'
          token: ${{ secrets.GITOPS_TOKEN }}
          path: 'quizapp-config'
          ref: 'main'

      - name: List config repo files
        run: ls -la quizapp-config/

      - name: Update Kubernetes manifest
        run: |
          cd quizapp-config

          MANIFEST_FILE="quizapp-manifest.yml"

          if [ ! -f "$MANIFEST_FILE" ]; then
            echo "ERROR: $MANIFEST_FILE not found. Files in repo:"
            ls -la
            exit 1
          fi

          sed -i "s|image:.*quizapp-backend.*|image: ${{ secrets.DOCKER_USERNAME }}/quizapp-backend:${{ needs.build-and-push.outputs.image_tag }}|g" "$MANIFEST_FILE"
          sed -i "s|image:.*quizapp-frontend.*|image: ${{ secrets.DOCKER_USERNAME }}/quizapp-frontend:${{ needs.build-and-push.outputs.image_tag }}|g" "$MANIFEST_FILE"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add "$MANIFEST_FILE"

          if git diff --staged --quiet; then
            echo "No changes detected. Skipping push."
          else
            git commit -m "chore: update images to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
            git push origin main
          fi
